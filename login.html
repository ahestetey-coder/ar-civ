<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="robots" content="noindex" />
  <title>AR-CİV · Admin girişi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin">
  <div class="adminlogin" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <form class="adminlogin__card" id="loginForm" autocomplete="off">
      <span class="adminlogin__brand">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span>AR-CİV · Admin</span>
      </span>
      <h2 id="loginTitle">Yönetim paneli</h2>
      <p class="adminlogin__hint">İçeriği düzenlemek ve yayınlamak için şifre girin.</p>

      <label class="adminlogin__field" for="loginPwd">
        <span>Şifre</span>
        <input id="loginPwd" type="password" autocomplete="current-password" required autofocus />
      </label>

      <button type="submit" id="loginBtn" class="adminlogin__btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        <span>Giriş yap</span>
      </button>
      <p class="adminlogin__error" id="loginError" hidden></p>
    </form>
  </div>

  <script>
    (function () {
      const form = document.getElementById('loginForm');
      const pwd  = document.getElementById('loginPwd');
      const btn  = document.getElementById('loginBtn');
      const err  = document.getElementById('loginError');

      function nextUrl() {
        const params = new URLSearchParams(location.search);
        const target = params.get('next');
        if (target && target.startsWith('/') && !target.startsWith('//')) return target;
        return '/admin.html';
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        err.hidden = true;
        err.textContent = '';
        if (!pwd.value) return;

        btn.disabled = true;
        const orig = btn.innerHTML;
        btn.innerHTML = '<span>Doğrulanıyor…</span>';

        try {
          const res = await fetch('/api/admin-auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pwd.value }),
          });
          if (res.status === 401) {
            err.textContent = 'Şifre yanlış';
            err.hidden = false;
            pwd.select();
            return;
          }
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || ('HTTP ' + res.status));
          }
          /* Mirror the password into sessionStorage so 'Yayına al'
             on the admin page doesn't prompt a second time. */
          try { sessionStorage.setItem('strata.publishPwd', pwd.value); } catch (_) {}
          location.replace(nextUrl());
        } catch (e) {
          err.textContent = 'Hata: ' + (e.message || e);
          err.hidden = false;
        } finally {
          btn.disabled = false;
          btn.innerHTML = orig;
        }
      });
    })();
  </script>
</body>
</html>
